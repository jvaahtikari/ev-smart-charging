      # ── sensor.ev_last_target_decision ───────────────────────────────────────
      # Session 2: predictor.py writes state + attributes to input_text.ev_last_target_decision.
      # This sensor is a pass-through — state from input_text, attributes mirrored from it.
      - name: "EV last target decision"
        unique_id: ev_last_target_decision
        icon: mdi:brain
        state: "{{ states('input_text.ev_last_target_decision') or 'unknown' }}"
        attributes:
          decision_time: "{{ state_attr('input_text.ev_last_target_decision','decision_time') or 'unknown' }}"
