      - name: "EV plan cycle cost"
        unique_id: ev_plan_cycle_cost
        icon: mdi:cash-clock
        state: "{{ states('input_text.ev_plan_cycle_cost') or 'unknown' }}"
        attributes:
          start_time: "{{ state_attr('input_text.ev_plan_cycle_cost','start_time') or 'unknown' }}"
          end_time: "{{ state_attr('input_text.ev_plan_cycle_cost','end_time') or 'unknown' }}"
          total_kwh: "{{ state_attr('input_text.ev_plan_cycle_cost','total_kwh') or 0 }}"
          total_cost_eur: "{{ state_attr('input_text.ev_plan_cycle_cost','total_cost_eur') or 0 }}"
          avg_price_ckwh: "{{ state_attr('input_text.ev_plan_cycle_cost','avg_price_ckwh') or 0 }}"
          extra_slots_cost_eur: "{{ state_attr('input_text.ev_plan_cycle_cost','extra_slots_cost_eur') or 0 }}"

      # ── sensor.ev_monthly_cost_summary ───────────────────────────────────────
      # Session 3: session_monitor.py writes to input_text.ev_monthly_cost_summary.
      - name: "EV monthly cost summary"
        unique_id: ev_monthly_cost_summary
        icon: mdi:calendar-month
        state: "{{ states('input_text.ev_monthly_cost_summary') or 'unknown' }}"
        attributes:
          month: "{{ state_attr('input_text.ev_monthly_cost_summary','month') or 'unknown' }}"
          total_kwh: "{{ state_attr('input_text.ev_monthly_cost_summary','total_kwh') or 0 }}"
          total_cost_eur: "{{ state_attr('input_text.ev_monthly_cost_summary','total_cost_eur') or 0 }}"
          avg_price_ckwh: "{{ state_attr('input_text.ev_monthly_cost_summary','avg_price_ckwh') or 0 }}"
          cycle_count: "{{ state_attr('input_text.ev_monthly_cost_summary','cycle_count') or 0 }}"

      # ── sensor.ev_chart_data_updated ─────────────────────────────────────────
      # Session 2: chart_data_writer.py writes timestamp to input_text.ev_chart_data_updated.
      # UI watches this sensor to know when to re-fetch chart_data.json.
      - name: "EV chart data updated"
        unique_id: ev_chart_data_updated
        icon: mdi:chart-line
        state: "{{ states('input_text.ev_chart_data_updated') or 'unknown' }}"
        attributes:
          updated_at: "{{ states('input_text.ev_chart_data_updated') or 'unknown' }}"

      # ── sensor.ev_system_ready ───────────────────────────────────────────────
      # Session 2: startup_monitor.py writes 'true'/'false' to input_text.ev_system_ready.
      # UI shows 'System starting...' until this reads 'true'.
      - name: "EV system ready"
        unique_id: ev_system_ready
        icon: mdi:check-circle-outline
        state: "{{ states('input_text.ev_system_ready') or 'false' }}"

  - binary_sensor:

      # ── binary_sensor.ev_car_home ────────────────────────────────────────────
      # True when Smart #1 GPS device tracker reports home zone.
      # Uses device_tracker.smart_none (GPS with lat/long, confirmed Session 0).
      # NOT device_tracker.smartvehicle871 (iBeacon — never phone location).
      - name: "EV car home"
        unique_id: ev_car_home
        device_class: presence
        icon: mdi:home-account
        state: "{{ is_state('device_tracker.smart_none', 'home') }}"


# ─── Session 1: New Input Helpers ────────────────────────────────────────────

input_boolean:
  ev_journey_mode_enabled:
    name: "EV Journey Mode Enabled"
    initial: false
    icon: mdi:map-marker-path
  ev_preheat_from_grid:
    name: "EV Preheat from Grid"
    initial: false
    icon: mdi:thermometer-auto

input_datetime:
  ev_departure_time:
    name: "EV Departure Time"
    has_date: true
    has_time: true
    icon: mdi:clock-start
  ev_return_time:
    name: "EV Return Time"
    has_date: true
    has_time: true
    icon: mdi:clock-end

input_number:
  ev_grid_fixed_fee_ckwh:
    name: "EV Grid Fixed Fee"
    min: 0
    max: 20
    step: 0.5
    initial: 6.5
    unit_of_measurement: "c/kWh"
    icon: mdi:transmission-tower
    mode: slider

# ─── Session 2: input_text backends for AppDaemon-written sensors ─────────────
# AppDaemon scripts write to these; template sensors above read from them.
# This pattern avoids HA template engine / AppDaemon set_state() conflicts.

input_text:
  ev_active_mode:
    name: "EV Active Mode (backend)"
    max: 64
    initial: "disabled"
    icon: mdi:car-electric-outline
  ev_status_narrative:
    name: "EV Status Narrative (backend)"
    max: 255
    initial: "Smart charging is off. Charger will not run automatically."
    icon: mdi:comment-text-outline
  ev_last_target_decision:
    name: "EV Last Target Decision (backend)"
    max: 64
    initial: "unknown"
    icon: mdi:brain
  ev_chart_data_updated:
    name: "EV Chart Data Updated (backend)"
    max: 64
    initial: "unknown"
    icon: mdi:chart-line
  ev_system_ready:
    name: "EV System Ready (backend)"
    max: 8
    initial: "false"
    icon: mdi:check-circle-outline
  # Session 3: session_monitor.py writes plan cycle state
  ev_plan_cycle_cost:
    name: "EV Plan Cycle Cost (backend)"
    max: 32
    initial: "unknown"
    icon: mdi:cash-clock
  # Session 3: session_monitor.py writes monthly summary state
  ev_monthly_cost_summary:
    name: "EV Monthly Cost Summary (backend)"
    max: 32
    initial: "unknown"
    icon: mdi:calendar-month

