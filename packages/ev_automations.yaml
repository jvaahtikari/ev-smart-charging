# EV Charging Automations
# Consolidated from automations.yaml for cleaner package-based structure.

automation:
  - id: ev_price_slots_15m_refresh
    alias: EV price slots 15m refresh
    mode: single
    triggers:
    - trigger: time_pattern
      minutes: '0'
    - trigger: homeassistant
      event: start
    actions:
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.ev_price_slots_15m
  - id: ev_enabled_capture_start_kwh
    alias: EV enabled → capture start kWh (validated)
    mode: single
    triggers:
    - trigger: state
      entity_id: input_boolean.ev_smart_charge_enabled
      to: 'on'
    conditions:
    - condition: template
      value_template: '{{ states(''sensor.zag063912_energy_meter'') not in [''unknown'',''unavailable'',''none'','''']
        }}

        '
    actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_start_kwh
      data:
        value: '{{ states(''sensor.zag063912_energy_meter'') | float }}'
  - id: ev_target_kwh_clamp_to_soc_limit
    alias: EV UI guard → clamp target kWh to SOC limit
    description: Clamp EV target kWh so it cannot exceed remaining capacity (SOC→100%).
    mode: single
    triggers:
    - trigger: state
      entity_id:
      - input_number.ev_target_kwh
      - sensor.smart_battery
      - sensor.ev_headroom_to_max_soc_kwh
    actions:
    - variables:
        target: '{{ states(''input_number.ev_target_kwh'') | float(0) }}'
        limit_s: '{{ states(''sensor.ev_headroom_to_max_soc_kwh'') }}'
        limit: "{% if limit_s in ['unknown','unavailable','none',''] %}\n  -1\n{% else
          %}\n  {{ limit_s | float(-1) }}\n{% endif %}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ limit >= 0 and target > limit }}'
        sequence:
        - action: input_number.set_value
          target:
            entity_id: input_number.ev_target_kwh
          data:
            value: '{# round DOWN to step 0.5 kWh (input_number step=0.5) #} {% set
              step = 0.5 %} {% set v = (limit / step) | round(0, ''floor'') * step %}
              {{ [v, 0] | max | round(2) }}'
  - id: ev_deadline_guard_no_past
    alias: EV UI guard → prevent past deadline
    mode: single
    triggers:
    - trigger: state
      entity_id: input_datetime.ev_deadline
    actions:
    - variables:
        dl_s: '{{ states(''input_datetime.ev_deadline'') }}'
        dl_ts: "{% if dl_s in ['unknown','unavailable','none',''] %}\n  none\n{% else
          %}\n  {{ as_timestamp(as_datetime(dl_s)) }}\n{% endif %}"
        now_ts: '{{ as_timestamp(now()) }}'
        min_ok_ts: '{{ now_ts + 15*60 }}'
        next_q_ts: '{# round up to next 15-min boundary #} {% set t = (min_ok_ts | int)
          %} {{ ((t // 900) + 1) * 900 }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ dl_ts is not none and dl_ts < min_ok_ts }}'
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ev_deadline
          data:
            timestamp: '{{ next_q_ts }}'
  - id: ev_campaign_cost_reset_on_session_start
    alias: EV campaign → reset cost on session start
    mode: single
    triggers:
    - trigger: state
      entity_id: input_boolean.ev_charge_session_active
      to: 'on'
    actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_campaign_cost_eur
      data:
        value: 0
  - id: ev_campaign_cost_accumulate_15m
    alias: EV campaign → accumulate cost every 15m
    mode: single
    triggers:
    - trigger: time_pattern
      minutes: /15
      seconds: 1
    conditions:
    - condition: state
      entity_id: input_boolean.ev_charge_session_active
      state: 'on'
    actions:
    - variables:
        cur: '{{ states(''input_number.ev_campaign_cost_eur'') | float(0) }}'
        add: '{{ states(''sensor.ev_cost_this_15m_eur'') | float(0) }}'
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_campaign_cost_eur
      data:
        value: '{{ (cur + add) | round(2) }}'

  - id: ev_plug_in_takeover_gate
    alias: EV plug-in → takeover gate (stop unless slot now)
    mode: single
    triggers:
    - trigger: state
      entity_id: sensor.zag063912_charger_mode
      from:
      - disconnected
      - unknown
      to: connected_requesting
    - trigger: state
      entity_id: sensor.zag063912_charger_mode
      from:
      - disconnected
      - unknown
      to: connected_charging
    conditions:
    - condition: state
      entity_id: input_boolean.ev_smart_charge_enabled
      state: 'on'
    - condition: state
      entity_id: input_boolean.ev_takeover_armed
      state: 'on'
    actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_takeover_armed
    - choose:
      - conditions:
        - condition: state
          entity_id: binary_sensor.ev_should_charge_now_combined
          state: 'off'
        sequence:
        - action: button.press
          target:
            entity_id: button.zag063912_stop_charging
      default: []



  - id: ev_takeover_armed_init_on_start
    alias: EV takeover → init armed on HA start
    mode: single
    triggers:
    - trigger: homeassistant
      event: start
    actions:
    - choose:
      - conditions:
        - condition: template
          value_template: >
            {{ states('sensor.zag063912_charger_mode') in ['disconnected','unknown']
               and is_state('switch.zag063912_charging','off') }}
        sequence:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.ev_takeover_armed
      default:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ev_takeover_armed

  - id: ev_takeover_rearm_on_disconnect_or_safe_unknown
    alias: EV takeover → re-arm on disconnect (or safe unknown)
    mode: single
    triggers:
    - trigger: state
      entity_id: sensor.zag063912_charger_mode
      to: disconnected
    - trigger: state
      entity_id: sensor.zag063912_charger_mode
      to: unknown
      for: "00:02:00"
    conditions:
    - condition: state
      entity_id: switch.zag063912_charging
      state: 'off'
    actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_takeover_armed

  - id: ev_enabled_capture_start_soc
    alias: EV enabled → capture start SOC
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.ev_smart_charge_enabled
        to: "on"
    actions:
      - variables:
          soc_raw: "{{ states('sensor.smart_battery') }}"
      - condition: template
        value_template: "{{ soc_raw not in ['unknown','unavailable','none',''] }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.ev_start_soc
        data:
          value: "{{ soc_raw | float(0) | round(0) }}"

  - id: ev_target_reached_stop
    alias: EV target reached → stop charging
    description: >-
      When ev_remaining_used_kwh drops to near-zero (target fully charged),
      stop the charger after a 30-second debounce to avoid false stops during
      slider adjustments. If the target is raised again, the master controller
      resumes charging in the next cheap slot automatically.
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.ev_remaining_used_kwh
        below: 0.05
        for: "00:00:30"
    conditions:
      - condition: state
        entity_id: input_boolean.ev_smart_charge_enabled
        state: "on"
      # Don't stop while min charge plan wants to charge this slot
      - condition: state
        entity_id: binary_sensor.ev_should_charge_now_min_charge
        state: "off"
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ is_state('switch.zag063912_charging','on') or
                     states('sensor.zag063912_charger_mode') == 'connected_charging' }}
            sequence:
              - action: button.press
                target:
                  entity_id: button.zag063912_stop_charging

