# EV Charging UI Sensors & Helpers
# Consolidated from configuration.yaml for cleaner package-based structure.
# All UI/diagnostic template sensors for the EV smart charging system.

template:
  - sensor:
      - name: "EV Charging Status (UI)"
        unique_id: ev_charging_status_ui
        icon: mdi:car-electric
        state: >-
          {% if is_state('input_boolean.ev_smart_charge_enabled','on') %}
            Smart charging ON
          {% else %}
            Smart charging OFF
          {% endif %}
        attributes:
          text: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set soc_raw = states('sensor.smart_battery') %}
            {% set soc = soc_raw | float(0) if soc_raw not in ['unknown','unavailable','none',''] else none %}
            {% set target = states('input_number.ev_max_soc') | float(100) %}
            {% set rem = states('sensor.ev_max_target_from_soc_kwh') | float(0) %}
            {% set should = is_state('binary_sensor.ev_should_charge_now_15m','on') %}
            {% set mode = states('sensor.zag063912_charger_mode') %}
            {% set charging = (mode == 'connected_charging') %}
            {% set dl = states('input_datetime.ev_deadline') %}
            {% set deadline = as_local(as_datetime(dl)).strftime('%d.%m.%Y %H:%M') if dl not in ['unknown','unavailable','none',''] else 'ei asetettu' %}
            {% if not enabled %}
            🔌 Smart charging ei ole aktiivinen.
            {% elif soc is none %}
            ⚠️ Auton SOC ei ole saatavilla.
            {% else %}
            🚗 Auto: {{ soc | round(0) }} %<br>
            🎯 Tavoite: {{ target | round(0) }} %<br>
            ⚡ Puuttuu: {{ rem | round(2) }} kWh<br>
            ⏰ Deadline: {{ deadline }}<br>
            {% if soc >= target - 0.1 %}
            ✅ Tavoite saavutettu.
            {% elif should and charging %}
            🔄 Ladataan parhaillaan.
            {% elif should and not charging %}
            ⚠️ Latausta pyydetään, mutta laturi ei lataa (tila: {{ mode }}).
            {% elif not should and charging %}
            ⚠️ Laturi lataa, vaikka slotti ei ole aktiivinen.
            {% else %}
            ⏳ Odottaa seuraavaa latausslottia.
            {% endif %}
            {% endif %}
            
  - sensor:
      - name: "EV UI status text"
        unique_id: ev_ui_status_text
        icon: mdi:car-electric
        state: >-
          {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
          {% if not enabled %} Inactive {% else %} Active {% endif %}
        attributes:
          text: |
            {%- set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') -%}
            {%- set soc_raw = states('sensor.smart_battery') -%}
            {%- set soc = soc_raw | float(0) if soc_raw not in ['unknown','unavailable','none',''] else none -%}
            {%- set target = states('input_number.ev_max_soc') | float(100) -%}

            {%- set dl = states('input_datetime.ev_deadline') -%}
            {%- set end_ts = as_timestamp(as_datetime(dl)) if dl not in ['unknown','unavailable','none',''] else none -%}
            {%- set now_ts = as_timestamp(now()) -%}

            {%- set kw = states('sensor.ev_effective_charge_power_kw') | float(0) -%}
            {%- set per_q = kw * 0.25 -%}
            {%- set rem_kwh = states('sensor.ev_max_target_from_soc_kwh') | float(0) -%}

            {%- set should_now = is_state('binary_sensor.ev_should_charge_now_15m','on') -%}
            {%- set allowed = is_state('switch.zag063912_charging','on') -%}
            {%- set mode = states('sensor.zag063912_charger_mode') -%}
            {%- set actually = (mode == 'connected_charging') -%}

            {%- set left_q = none -%}
            {%- if end_ts is not none -%}
              {%- set left_q = ((end_ts - now_ts) / 900) | round(0,'floor') | int -%}
            {%- endif -%}

            {%- set q_need = 0 -%}
            {%- if per_q > 0 and rem_kwh > 0 -%}
              {%- set q_need = (rem_kwh / per_q) | round(0,'ceil') | int -%}
            {%- endif -%}

            {%- set tight = none -%}
            {%- if left_q is not none -%}
              {%- set tight = (left_q <= (q_need + 1)) -%}
            {%- endif -%}

            ## EV-lataus – tilannekuva (Suomen aika)

            **Ohjaus:** {{ 'PÄÄLLÄ' if enabled else 'POIS' }}
            **Auto:** {% if soc is none %}SOC ei saatavilla{% else %}{{ soc | round(0) }}%{% endif %}
            **Tavoite:** {{ target | round(0) }}%

            **Puuttuva energia tavoitteen saavuttamiseen (SOC-pohjainen):** {{ rem_kwh | round(2) }} kWh
            **Oletettu teho:** {{ kw | round(1) }} kW → **per 15 min:** {{ (per_q if per_q>0 else 0) | round(2) }} kWh
            **Arvio sloteista vielä:** {{ q_need }} × 15 min

            **Deadline:** {%- if dl in ['unknown','unavailable','none',''] -%} ei asetettu
              {%- else -%} {{ as_local(as_datetime(dl)).strftime('%d.%m.%Y %H:%M') }}
              {%- endif -%}
            **Aikaa jäljellä:** {%- if left_q is none -%} ?
              {%- else -%} {{ left_q }} × 15 min ({{ ((end_ts - now_ts)/3600) | round(2) }} h)
              {%- endif -%}
            **Aikataulu:** {%- if tight is none -%} ei arvioitavissa
              {%- else -%} {{ 'TIUKALLA' if tight else 'OK' }}
              {%- endif -%}

            **Tässä 15 min slotissa:** pyydetäänkö latausta = {{ 'KYLLÄ' if should_now else 'EI' }}
            **Zaptec:** sallittu = {{ 'KYLLÄ' if allowed else 'EI' }}, tila = {{ mode }}
            **Toteutuuko lataus nyt:** {{ 'KYLLÄ' if actually else 'EI' }}

            {%- if enabled and should_now and allowed and (not actually) -%}
            ⚠️ **Poikkeama:** järjestelmä pyytää latausta, mutta Zaptec ei ole *connected_charging* -tilassa.
            {%- endif -%}

            {%- if (soc is not none) and (soc >= (target - 0.1)) -%}
            ✅ **Tavoite saavutettu** (SOC tavoitteen tasolla).
            {%- endif -%}

          status_compact: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set soc_raw = states('sensor.smart_battery') %}
            {% set soc = soc_raw | float(0) if soc_raw not in ['unknown','unavailable','none',''] else none %}
            {% set target = states('input_number.ev_max_soc') | float(100) %}
            {% set rem = states('sensor.ev_max_target_from_soc_kwh') | float(0) %}
            {% if not enabled %}
              OFF
            {% elif soc is none %}
              Active: SOC?
            {% else %}
              Active: {{ soc | round(0) }}% → {{ target | round(0) }}% (rem {{ rem | round(1) }} kWh)
            {% endif %}
            
  - sensor:
      - name: "EV schedule check"
        unique_id: ev_schedule_check
        icon: mdi:timeline-clock
        state: >-
          {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
          {% if not enabled %}
            DISABLED
          {% else %}
            {% set charge_now = is_state('input_boolean.ev_charge_now_override','on') %}
            {% set min_on = is_state('input_boolean.ev_min_charge_enabled','on') %}
            {% set mode = 'CHARGE_NOW' if charge_now else ('SMART+MIN' if min_on else 'SMART') %}
            {% set soc_raw = states('sensor.smart_battery') %}
            {% set soc = soc_raw | float(none) if soc_raw not in ['unknown','unavailable','none',''] else none %}
            {% if soc is none %}
              {{ mode }} | No car SOC
            {% else %}
              {% set kw = states('sensor.ev_effective_charge_power_kw') | float(0) %}
              {% set per_q = kw * 0.25 %}
              {% set now_ts = as_timestamp(now()) | int %}
              {% set rem = states('sensor.ev_remaining_used_kwh') | float(0) %}
              {% set dl = states('input_datetime.ev_deadline') %}
              {% set end_ts = as_timestamp(as_datetime(dl)) | int if dl not in ['unknown','unavailable','none',''] else 0 %}
              {% set left_q = ((end_ts - now_ts) / 900) | round(0,'floor') | int if end_ts > now_ts else 0 %}
              {% set need_q = (rem / per_q) | round(0,'ceil') | int if per_q > 0 and rem > 0 else 0 %}
              {% set tight = left_q > 0 and need_q > 0 and left_q <= (need_q + 1) %}
              {% set smart_str = 'rem ' ~ (rem | round(2)) ~ 'kWh need ' ~ need_q ~ ' left ' ~ left_q ~ 'x15m ' ~ ('TIGHT!' if tight else 'ok') %}
              {% if min_on %}
                {% set min_rem = states('sensor.ev_min_charge_target_kwh') | float(0) %}
                {% set min_dl_ts = states('sensor.ev_min_charge_deadline_ts') | int(0) %}
                {% set min_left_q = ((min_dl_ts - now_ts) / 900) | round(0,'floor') | int if min_dl_ts > now_ts else 0 %}
                {% set min_need_q = (min_rem / per_q) | round(0,'ceil') | int if per_q > 0 and min_rem > 0 else 0 %}
                {% set min_tight = min_left_q > 0 and min_need_q > 0 and min_left_q <= (min_need_q + 1) %}
                {% set min_str = ' | min ' ~ (min_rem | round(2)) ~ 'kWh need ' ~ min_need_q ~ ' left ' ~ min_left_q ~ 'x15m ' ~ ('TIGHT!' if min_tight else 'ok') %}
              {% else %}
                {% set min_str = '' %}
              {% endif %}
              {{ mode }} | SOC {{ soc | round(0) }}% | {{ smart_str }}{{ min_str }}
            {% endif %}
          {% endif %}
        attributes:
          mode: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% if not enabled %}
              disabled
            {% elif is_state('input_boolean.ev_charge_now_override','on') %}
              charge_now
            {% elif is_state('input_boolean.ev_min_charge_enabled','on') %}
              smart+min
            {% else %}
              smart
            {% endif %}
          charge_now_active: >-
            {{ is_state('input_boolean.ev_charge_now_override','on') }}
          min_charge_active: >-
            {{ is_state('input_boolean.ev_min_charge_enabled','on') }}
          soc_now: >-
            {% set v = states('sensor.smart_battery') %}
            {{ v if v not in ['unknown','unavailable','none',''] else 'unknown' }}
          soc_target: >-
            {{ states('input_number.ev_max_soc') }}
          deadline_local: >-
            {% set dl = states('input_datetime.ev_deadline') %}
            {% if dl in ['unknown','unavailable','none',''] %}
              unknown
            {% else %}
              {{ as_local(as_datetime(dl)).strftime('%d.%m.%Y %H:%M') }}
            {% endif %}
          smart_rem_kwh: >-
            {{ states('sensor.ev_remaining_used_kwh') | float(0) | round(3) }}
          smart_need_q: >-
            {% set kw = states('sensor.ev_effective_charge_power_kw') | float(0) %}
            {% set per_q = kw * 0.25 %}
            {% set rem = states('sensor.ev_remaining_used_kwh') | float(0) %}
            {% if per_q <= 0 or rem <= 0 %}0{% else %}{{ (rem / per_q) | round(0, 'ceil') | int }}{% endif %}
          smart_left_q: >-
            {% set dl = states('input_datetime.ev_deadline') %}
            {% set end_ts = as_timestamp(as_datetime(dl)) if dl not in ['unknown','unavailable','none',''] else none %}
            {% if end_ts is none %}unknown{% else %}{{ ((end_ts - as_timestamp(now())) / 900) | round(0,'floor') | int }}{% endif %}
          smart_tight: >-
            {% set kw = states('sensor.ev_effective_charge_power_kw') | float(0) %}
            {% set per_q = kw * 0.25 %}
            {% set rem = states('sensor.ev_remaining_used_kwh') | float(0) %}
            {% set need_q = (rem / per_q) | round(0,'ceil') | int if per_q > 0 and rem > 0 else 0 %}
            {% set dl = states('input_datetime.ev_deadline') %}
            {% set end_ts = as_timestamp(as_datetime(dl)) if dl not in ['unknown','unavailable','none',''] else none %}
            {% if end_ts is none %}unknown{% else %}{{ ((end_ts - as_timestamp(now())) / 900) | round(0,'floor') | int <= (need_q + 1) }}{% endif %}
          min_charge_target_kwh: >-
            {{ states('sensor.ev_min_charge_target_kwh') | float(0) | round(3) }}
          min_charge_deadline_local: >-
            {% set ts = states('sensor.ev_min_charge_deadline_ts') | int(0) %}
            {% if ts <= 0 %}unknown{% else %}{{ as_local(as_datetime(ts)).strftime('%d.%m.%Y %H:%M') }}{% endif %}
          min_charge_left_q: >-
            {% set ts = states('sensor.ev_min_charge_deadline_ts') | int(0) %}
            {% if ts <= 0 %}unknown{% else %}{{ ((ts - as_timestamp(now())) / 900) | round(0,'floor') | int }}{% endif %}
          min_charge_tight: >-
            {{ is_state('binary_sensor.ev_warning_min_charge_not_enough_slots','on') }}
          effective_kw: >-
            {{ states('sensor.ev_effective_charge_power_kw') | float(0) | round(2) }}
          note: "Mode-aware schedule check. Controls: disabled/smart/charge_now/smart+min. Does not control charging."

  - sensor:
      - name: "EV active plan text"
        unique_id: ev_active_plan_text
        icon: mdi:calendar-clock
        state: >-
          {{ states('sensor.ev_planned_cost_eur_v3') }}
        attributes:
          text: |
            {%- set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') -%}
            {%- set attr_name = 'planned_slots' if enabled else 'preview_slots' -%}
            {%- set slots = state_attr('sensor.ev_plan_15m_rank', attr_name) -%}
            {%- set planned_cost = states('sensor.ev_planned_cost_eur_v3') | float(0) -%}
            {%- set planned_kwh = state_attr('sensor.ev_planned_cost_eur','planned_energy_kwh') | float(0) -%}

            {%- if slots is not iterable or slots is string or slots|length == 0 -%}
            ## Active plan (Suomen aika)

            Ei suunnitelmaa.
            {%- else -%}
            {%- set adders = states('input_number.ev_transfer_fee_eur_kwh') | float(0.06387) -%}
            {%- set assumed_kw = states('input_number.ev_assumed_charge_kw') | float(0) -%}
            {%- set per_slot_kwh = assumed_kw * 0.25 -%}

            ## Active plan (Suomen aika)

            {{ slots|length }} × 15 min (Enabled={{ 'ON' if enabled else 'OFF' }})
            Planned energy: {{ planned_kwh | round(1) }} kWh
            Total cost (planner): {{ planned_cost | round(2) }} €

            {% for s in slots %}
            {%- set ts = (s.ts if s.ts is defined else s['ts']) | int(0) -%}
            {%- set when = as_local(as_datetime(ts)).strftime('%d.%m %H:%M') -%}
            {%- set p_raw = (s.price if s.price is defined else s['price']) | float(0) -%}
            {%- if p_raw > 200 -%}
            {%- set p_eur = p_raw / 1000 -%}
            {%- elif p_raw > 2 -%}
            {%- set p_eur = p_raw / 100 -%}
            {%- else -%}
            {%- set p_eur = p_raw -%}
            {%- endif -%}
            {%- set total_price = p_eur + adders -%}
            {%- set slot_cost = per_slot_kwh * total_price -%}
            {{ when }} | {{ total_price | round(3) }} €/kWh | {{ slot_cost | round(2) }} €
            {% endfor %}
            {%- endif -%}
            
  - sensor:
      - name: "current price (15m, EUR/kWh)"
        unique_id: ev_current_price_15m_eur_kwh
        unit_of_measurement: EUR/kWh
        icon: mdi:tag
        state: >-
          {% set data = state_attr('sensor.ev_price_slots_15m_effective','data') %}
          {% if data is not iterable or data|length == 0 %}
            unknown
          {% else %}
            {% set slot_ts = (as_timestamp(now()) // 900) * 900 %}
            {% set found = namespace(v=none) %}
            {% for it in data %}
              {% set ts = as_timestamp(it.DateTime) %}
              {% if ts is not none and (ts | int) == (slot_ts | int) %}
                {% set found.v = it.PriceWithTax %}
              {% endif %}
            {% endfor %}
            {% if found.v is none %}
              unknown
            {% else %}
              {% set fee = states('input_number.ev_transfer_fee_eur_kwh') | float(0.06387) %}
              {{ (found.v | float(0) + fee) | round(4) }}
            {% endif %}
          {% endif %}



      - name: "EV cost this 15m (EUR)"
        unique_id: ev_cost_this_15m_eur
        unit_of_measurement: EUR
        icon: mdi:currency-eur
        state: >-
          {% set e = states('sensor.ev_zaptec_energy_15m_kwh') %}
          {% set p = states('sensor.ev_current_price_15m_eur_kwh') %}
          {% if e in ['unknown','unavailable','none',''] or p in ['unknown','unavailable','none',''] %}
            0.0
          {% else %}
            {{ (e | float(0) * p | float(0)) | round(3) }}
          {% endif %}

  - sensor:
      - name: "EV planned cost (EUR)"
        unique_id: ev_planned_cost_eur
        unit_of_measurement: EUR
        icon: mdi:currency-eur
        state: >-
          {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
          {% set slots = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
          {% set assumed_kw = states('input_number.ev_assumed_charge_kw') | float(0) %}

          {% set margin_eur_per_kwh = 0.0038 %}
          {% set transfer_eur_per_kwh = 0.03187 %}
          {% set tax_eur_per_kwh = 0.0282 %}
          {% set adder_eur_per_kwh = margin_eur_per_kwh + transfer_eur_per_kwh + tax_eur_per_kwh %}

          {% if slots is not iterable or slots|length == 0 or assumed_kw <= 0 %}
            0.0
          {% else %}
            {% set per_slot_kwh = assumed_kw * 0.25 %}
            {% set base = namespace(v=0.0) %}

            {# Price normalization -> EUR/kWh #}
            {% for s in slots %}
              {% set p_raw = s.price | float(0) %}
              {% if p_raw > 200 %}
                {% set p = p_raw / 1000 %}
              {% elif p_raw > 2 %}
                {% set p = p_raw / 100 %}
              {% else %}
                {% set p = p_raw %}
              {% endif %}
              {% set base.v = base.v + (per_slot_kwh * p) %}
            {% endfor %}

            {% set planned_energy_kwh = (slots|length * per_slot_kwh) %}
            {% set extra = planned_energy_kwh * adder_eur_per_kwh %}
            {{ (base.v + extra) | round(2) }}
          {% endif %}
        attributes:
          mode: >-
            {{ 'active' if is_state('input_boolean.ev_smart_charge_enabled','on') else 'preview' }}

          slots_count: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set slots = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
            {{ slots|length if slots is iterable else 0 }}

          planned_energy_kwh: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set slots = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
            {% set assumed_kw = states('input_number.ev_assumed_charge_kw') | float(0) %}
            {% if slots is not iterable or slots|length == 0 or assumed_kw <= 0 %}
              0
            {% else %}
              {{ (slots|length * assumed_kw * 0.25) | round(2) }}
            {% endif %}

          margin_eur_per_kwh: >-
            {{ 0.0038 }}

          transfer_eur_per_kwh: >-
            {{ 0.03187 }}

          tax_eur_per_kwh: >-
            {{ 0.0282 }}

          adders_total_eur_per_kwh: >-
            {{ states('input_number.ev_transfer_fee_eur_kwh') | float(0.06387) | round(5) }}

          base_energy_cost_eur: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set slots = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
            {% set assumed_kw = states('input_number.ev_assumed_charge_kw') | float(0) %}
            {% if slots is not iterable or slots|length == 0 or assumed_kw <= 0 %}
              0
            {% else %}
              {% set per_slot_kwh = assumed_kw * 0.25 %}
              {% set base = namespace(v=0.0) %}
              {% for s in slots %}
                {% set p_raw = s.price | float(0) %}
                {% if p_raw > 200 %}
                  {% set p = p_raw / 1000 %}
                {% elif p_raw > 2 %}
                  {% set p = p_raw / 100 %}
                {% else %}
                  {% set p = p_raw %}
                {% endif %}
                {% set base.v = base.v + (per_slot_kwh * p) %}
              {% endfor %}
              {{ base.v | round(4) }}
            {% endif %}

          adders_cost_eur: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set slots = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
            {% set assumed_kw = states('input_number.ev_assumed_charge_kw') | float(0) %}
            {% if slots is not iterable or slots|length == 0 or assumed_kw <= 0 %}
              0
            {% else %}
              {% set planned_energy_kwh = (slots|length * assumed_kw * 0.25) %}
              {% set fee = states('input_number.ev_transfer_fee_eur_kwh') | float(0.06387) %}
              {{ (planned_energy_kwh * fee) | round(4) }}
            {% endif %}

          avg_price_eur_per_kwh: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set slots = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
            {% if slots is not iterable or slots|length == 0 %}
              0
            {% else %}
              {% set sum = namespace(v=0.0) %}
              {% for s in slots %}
                {% set p_raw = s.price | float(0) %}
                {% if p_raw > 200 %}
                  {% set p = p_raw / 1000 %}
                {% elif p_raw > 2 %}
                  {% set p = p_raw / 100 %}
                {% else %}
                  {% set p = p_raw %}
                {% endif %}
                {% set sum.v = sum.v + p %}
              {% endfor %}
              {{ (sum.v / (slots|length)) | round(6) }}
            {% endif %}

          avg_total_eur_per_kwh_including_adders: >-
            {% set base = state_attr('sensor.ev_planned_cost_eur','avg_price_eur_per_kwh') | float(0) %}
            {{ (base + (states('input_number.ev_transfer_fee_eur_kwh') | float(0.06387))) | round(6) }}

          avg_price_raw: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set slots = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
            {% if slots is not iterable or slots|length == 0 %}
              0
            {% else %}
              {% set sum = namespace(v=0.0) %}
              {% for s in slots %}
                {% set sum.v = sum.v + (s.price | float(0)) %}
              {% endfor %}
              {{ (sum.v / (slots|length)) | round(6) }}
            {% endif %}

          price_unit_hint: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set slots = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
            {% if slots is not iterable or slots|length == 0 %}
              none
            {% else %}
              {% set p0 = (slots[0].price | float(0)) %}
              {% if p0 > 200 %} eur_per_mwh?
              {% elif p0 > 2 %} cents_per_kwh?
              {% else %} eur_per_kwh
              {% endif %}
            {% endif %}

            
      - name: "EV campaign cost so far (EUR)"
        unique_id: ev_campaign_cost_so_far_eur
        unit_of_measurement: EUR
        icon: mdi:cash-clock
        state: >-
          {% if not is_state('input_boolean.ev_charge_session_active','on') %}
            0.0
          {% else %}
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% if not enabled %}
              0.0
            {% else %}
              {% set slots = state_attr('sensor.ev_plan_15m_rank','planned_slots') %}
              {% set assumed_kw = states('input_number.ev_assumed_charge_kw') | float(0) %}
              {% set delivered = states('sensor.ev_delivered_this_session_kwh') | float(0) %}
              {% if slots is not iterable or slots|length == 0 or assumed_kw <= 0 or delivered <= 0 %}
                0.0
              {% else %}
                {% set now_q = (as_timestamp(now()) // 900) * 900 %}
                {% set elapsed = slots | selectattr('ts','lt', now_q) | list %}
                {% set n = elapsed|length %}
                {% if n == 0 %}
                  0.0
                {% else %}
                  {% set per_slot_kwh = assumed_kw * 0.25 %}
                  {% set max_energy_elapsed = n * per_slot_kwh %}
                  {% set energy_to_price = [delivered, max_energy_elapsed] | min %}
                  {% if energy_to_price <= 0 %}
                    0.0
                  {% else %}
                    {# since per_slot_kwh is constant, weighted avg == mean price of elapsed slots #}
                    {% set sum_p = namespace(v=0.0) %}
                    {% for s in elapsed %}
                      {% set sum_p.v = sum_p.v + (s.price | float(0)) %}
                    {% endfor %}
                    {% set avg_p = sum_p.v / n %}
                    {{ (energy_to_price * avg_p) | round(2) }}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endif %}
        attributes:
          delivered_kwh: "{{ states('sensor.ev_delivered_this_session_kwh') | float(0) | round(3) }}"
          elapsed_slots: >-
            {% set slots = state_attr('sensor.ev_plan_15m_rank','planned_slots') %}
            {% set now_q = (as_timestamp(now()) // 900) * 900 %}
            {% if slots is not iterable %} 0 {% else %} {{ (slots | selectattr('ts','lt', now_q) | list | length) }} {% endif %}
          note: "Prices from elapsed active planned slots; delivered energy capped to elapsed planned energy (assumed kW)."





      - name: "EV effective charge power (kW)"
        unique_id: ev_effective_charge_kw
        unit_of_measurement: kW
        icon: mdi:flash
        state: >-
          {% set assumed = states('input_number.ev_assumed_charge_kw') | float(0) %}
          {% set kw = [assumed, 11.0] | min %}
          {% if kw <= 0 %}
            0
          {% else %}
            {{ kw | round(2) }}
          {% endif %}


  - sensor:
      - name: "EV max add to 100% (kWh)"
        unique_id: ev_max_add_to_100_kwh
        unit_of_measurement: kWh
        icon: mdi:battery-plus-outline
        state: >-
          {% set cap = 62.0 %}
          {% set soc = states('sensor.smart_battery') | float(0) %}
          {% set delta = 100.0 - soc %}
          {% if delta <= 0 %}
            0
          {% else %}
            {{ (cap * (delta/100.0)) | round(2) }}
          {% endif %}
        attributes:
          capacity_kwh: "62"
          current_soc_percent: >-
            {{ states('sensor.smart_battery') }}

  - sensor:
      - name: "EV max target from SOC (kWh)"
        unique_id: ev_max_target_from_soc_kwh
        unit_of_measurement: kWh
        icon: mdi:battery-arrow-up
        state: >-
          {% set headroom = states('sensor.ev_headroom_to_max_soc_kwh') | float(0) %}
          {% set target_add = states('input_number.ev_target_kwh') | float(0) %}
          {% set rem = [target_add, headroom] | min %}
          {{ [rem, 0] | max | round(3) }}

      - name: "EV headroom to max SOC (kWh)"
        unique_id: ev_headroom_to_max_soc_kwh
        unit_of_measurement: kWh
        icon: mdi:battery-arrow-up-outline
        state: >-
          {% set cap = 62.0 %}
          {% set soc = states('sensor.smart_battery') | float(0) %}
          {% set max_soc = states('input_number.ev_max_soc') | float(100) %}
          {% set delta = max_soc - soc %}
          {% if delta <= 0 %}
            0
          {% else %}
            {{ (cap * (delta/100.0)) | round(3) }}
          {% endif %}

      - name: "EV delivered this session (kWh)"
        unique_id: ev_delivered_session_kwh
        unit_of_measurement: kWh
        device_class: energy
        state_class: measurement
        state: >-
          {% set start = states('input_number.ev_session_start_kwh') | float(0) %}

          {# Prefer session energy if available (updates better than all-time meter) #}
          {% set s = states('sensor.zag063912_session_total_charge') %}
          {% if s not in ['unknown','unavailable','none',''] %}
            {% set cur = s | float(0) %}
          {% else %}
            {% set m = states('sensor.zag063912_energy_meter') %}
            {% set cur = m | float(0) if m not in ['unknown','unavailable','none',''] else 0 %}
          {% endif %}

          {{ [cur - start, 0] | max | round(3) }}


      - name: "EV remaining to target (kWh)"
        unique_id: ev_remaining_kwh
        unit_of_measurement: kWh
        device_class: energy
        state_class: measurement
        state: >-
          {% set target = states('input_number.ev_target_kwh') | float(0) %}
          {% set done_state = states('sensor.ev_delivered_this_session_kwh') %}
          {% set done = done_state | float(0) if done_state not in ['unknown','unavailable','none',''] else 0 %}
          {{ [target - done, 0] | max | round(3) }}

      - name: "EV delivered (car, this enabled period) kWh"
        unique_id: ev_delivered_car_kwh
        unit_of_measurement: kWh
        device_class: energy
        state_class: measurement
        state: >-
          {% set cur = states('sensor.ev_energy_in_car_kwh') | float(0) %}
          {% set start = states('input_number.ev_car_session_start_kwh') | float(0) %}
          {{ [cur - start, 0] | max | round(3) }}

      - name: "EV delivered (zaptec session, this enabled period) kWh"
        unique_id: ev_delivered_zaptec_session_kwh
        unit_of_measurement: kWh
        device_class: energy
        state_class: measurement
        state: >-
          {% set cur = states('sensor.zag063912_session_total_charge') | float(0) %}
          {% set start = states('input_number.ev_session_start_kwh') | float(0) %}
          {{ [cur - start, 0] | max | round(3) }}

      - name: "EV delivered used (kWh)"
        unique_id: ev_delivered_used_kwh
        unit_of_measurement: kWh
        device_class: energy
        state_class: measurement
        state: >-
          {% set age = state_attr('sensor.ev_smart_charge_status','smart_data_age_minutes') %}
          {% set age_i = (age | int(999)) if age not in ['unknown','unavailable','none',''] else 999 %}
          {% if age_i <= 3 %}
            {{ states('sensor.ev_delivered_car_kwh') | float(0) }}
          {% else %}
            {{ states('sensor.ev_delivered_zaptec_session_kwh') | float(0) }}
          {% endif %}

      - name: "EV remaining used (kWh)"
        unique_id: ev_remaining_used_kwh
        unit_of_measurement: kWh
        device_class: energy
        state_class: measurement
        state: >-
          {% set target = states('input_number.ev_target_kwh') | float(0) %}
          {% set done = states('sensor.ev_delivered_used_kwh') | float(0) %}
          {{ [target - done, 0] | max | round(3) }}

      - name: "EV charging plan"
        unique_id: ev_charging_plan_text
        icon: mdi:calendar-clock
        state: >-
          {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
          {% set plan = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
          {% if plan is not iterable or plan | length == 0 %}
            No slots
          {% else %}
            {{ plan | length }} slots ({{ 'active' if enabled else 'preview' }})
          {% endif %}
        attributes:
          mode: >-
            {{ 'active' if is_state('input_boolean.ev_smart_charge_enabled','on') else 'preview' }}
          schedule: >-
            {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
            {% set plan = state_attr('sensor.ev_plan_15m_rank', 'planned_slots' if enabled else 'preview_slots') %}
            {% if plan is not iterable or plan | length == 0 %}
              No slots
            {% else %}
              {% for slot in plan %}
                {% set ts = slot.ts | int %}
                {% set start = as_datetime(ts) %}
                {% set end = as_datetime(ts + 900) %}
                {{ start.strftime('%d.%m %H:%M') }}–{{ end.strftime('%H:%M') }} → {{ slot.price }}
                {% if not loop.last %}\n{% endif %}
              {% endfor %}
            {% endif %}




      - name: "EV smart charge status"
        unique_id: ev_smart_charge_status
        icon: mdi:information-outline
        state: >-
          {% set enabled = is_state('input_boolean.ev_smart_charge_enabled','on') %}
          {% set data = state_attr('sensor.ev_price_slots_15m','data') %}
          {% set data_ok = data is not none and (data | length) > 0 %}
          {% set now_ts = as_timestamp(now()) %}
          {% set dl = states('input_datetime.ev_deadline') %}
          {% set end_ts = as_timestamp(as_datetime(dl)) if dl not in ['unknown','unavailable','none',''] else 0 %}
          {% set remaining = states('sensor.ev_remaining_to_target_kwh') | float(0) %}
          {% if not enabled %}
            Inactive (manual control)
          {% elif not data_ok %}
            Enabled, but price data missing
          {% elif end_ts <= now_ts %}
            Deadline passed
          {% elif remaining <= 0 %}
            Target reached
          {% else %}
            Active (following plan)
          {% endif %}
        attributes:
          delivered_kwh: "{{ states('sensor.ev_delivered_this_session_kwh') | float(0) | round(3) }}"
          remaining_kwh: "{{ states('sensor.ev_remaining_to_target_kwh') | float(0) | round(3) }}"
          charging_allowed: "{{ is_state('switch.zag063912_charging','on') }}"
          should_charge_now: "{{ is_state('binary_sensor.ev_should_charge_now_15m','on') }}"
          smart_last_update: "{{ states('sensor.smart_last_update') }}"
          smart_battery_soc: "{{ states('sensor.smart_battery') }}"
          smart_charging_time_remaining: "{{ states('sensor.smart_charging_time_remaining') }}"
          smart_data_age_minutes: >-
            {% set lu = states('sensor.smart_last_update') %}
            {% if lu in ['unknown','unavailable','none',''] %}
              unknown
            {% else %}
              {% set ts = as_timestamp(as_datetime(lu)) %}
              {% if ts is none %}
                unknown
              {% else %}
                {{ ((as_timestamp(now()) - ts) / 60) | round(0) | int }}
              {% endif %}
            {% endif %}


  - number:
      - name: "EV target energy (kWh) [UI]"
        unique_id: ev_target_kwh_ui
        icon: mdi:battery-plus
        step: "0.5"
        min: "0"
        max: "{{ states('sensor.ev_headroom_to_max_soc_kwh') | float(0) }}"
        state: "{{ states('input_number.ev_target_kwh') | float(0) }}"
        set_value:
          - action: input_number.set_value
            target:
              entity_id: input_number.ev_target_kwh
            data:
              value: "{{ value | float(0) }}"

  - number:
      - name: "EV max SOC (%) [UI]"
        unique_id: ev_max_soc_ui
        icon: mdi:battery-high
        step: "1"
        min: "{{ states('sensor.smart_battery') | float(0) | round(0) }}"
        max: "100"
        state: "{{ states('input_number.ev_max_soc') | float(100) }}"
        set_value:
          - action: input_number.set_value
            target:
              entity_id: input_number.ev_max_soc
            data:
              value: >-
                {% set soc = states('sensor.smart_battery') | float(0) %}
                {% set v = value | float(0) %}
                {% if v < soc %}
                  {{ soc | round(0) }}
                {% elif v > 100 %}
                  100
                {% else %}
                  {{ v | round(0) }}
                {% endif %}

  - sensor:
      - name: "EV price debug (schema)"
        unique_id: ev_price_debug_schema
        icon: mdi:bug-outline
        state: >-
          {% set data = state_attr('sensor.ev_price_slots_15m','data') %}
          {% if data is not iterable or data|length == 0 %}
            no-data
          {% else %}
            {% set it = data[0] %}
            {% set keys = it.keys() | list if it is mapping else [] %}
            keys={{ keys | join(',') }}
          {% endif %}


