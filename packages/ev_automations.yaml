# EV Charging Automations
# Consolidated from automations.yaml for cleaner package-based structure.

# ── Session 3: new boolean helpers ──────────────────────────────────────────

input_boolean:
  # Set by session_monitor.py at 75% checkpoint when shortfall is unrecoverable.
  # Watched by mode_resolver.py — triggers P1 warning mode.
  # Cleared by session_monitor.py when plan cycle ends.
  ev_shortfall_unrecoverable:
    name: EV Shortfall Unrecoverable
    icon: mdi:alert-circle

  # Set when the no-plug-in notification has been sent.
  # Prevents repeat firing. Cleared at midnight and by "Remind in 30 min" action.
  ev_no_plugin_notified:
    name: EV No Plug-In Notified
    icon: mdi:bell-check

  # Set by "Skip tonight" iOS action — suppresses notification until midnight.
  ev_no_plugin_skip_tonight:
    name: EV No Plug-In Skip Tonight
    icon: mdi:bell-off

automation:
  - id: ev_price_slots_15m_refresh
    alias: EV price slots 15m refresh
    mode: single
    triggers:
    - trigger: time_pattern
      minutes: '0'
    - trigger: homeassistant
      event: start
    actions:
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.ev_price_slots_15m
  - id: ev_enabled_capture_start_kwh
    alias: EV enabled → capture start kWh (validated)
    mode: single
    triggers:
    - trigger: state
      entity_id: input_boolean.ev_smart_charge_enabled
      to: 'on'
    conditions:
    - condition: template
      value_template: '{{ states(''sensor.zag063912_energy_meter'') not in [''unknown'',''unavailable'',''none'','''']
        }}

        '
    actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_start_kwh
      data:
        value: '{{ states(''sensor.zag063912_energy_meter'') | float }}'
  - id: ev_target_kwh_clamp_to_soc_limit
    alias: EV UI guard → clamp target kWh to SOC limit
    description: Clamp EV target kWh so it cannot exceed remaining capacity (SOC→100%).
    mode: single
    triggers:
    - trigger: state
      entity_id:
      - input_number.ev_target_kwh
      - sensor.smart_battery
      - sensor.ev_headroom_to_max_soc_kwh
    actions:
    - variables:
        target: '{{ states(''input_number.ev_target_kwh'') | float(0) }}'
        limit_s: '{{ states(''sensor.ev_headroom_to_max_soc_kwh'') }}'
        limit: "{% if limit_s in ['unknown','unavailable','none',''] %}\n  -1\n{% else
          %}\n  {{ limit_s | float(-1) }}\n{% endif %}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ limit >= 0 and target > limit }}'
        sequence:
        - action: input_number.set_value
          target:
            entity_id: input_number.ev_target_kwh
          data:
            value: '{# round DOWN to step 0.5 kWh (input_number step=0.5) #} {% set
              step = 0.5 %} {% set v = (limit / step) | round(0, ''floor'') * step %}
              {{ [v, 0] | max | round(2) }}'
  - id: ev_deadline_guard_no_past
    alias: EV UI guard → prevent past deadline
    mode: single
    triggers:
    - trigger: state
      entity_id: input_datetime.ev_deadline
    actions:
    - variables:
        dl_s: '{{ states(''input_datetime.ev_deadline'') }}'
        dl_ts: "{% if dl_s in ['unknown','unavailable','none',''] %}\n  none\n{% else
          %}\n  {{ as_timestamp(as_datetime(dl_s)) }}\n{% endif %}"
        now_ts: '{{ as_timestamp(now()) }}'
        min_ok_ts: '{{ now_ts + 15*60 }}'
        next_q_ts: '{# round up to next 15-min boundary #} {% set t = (min_ok_ts | int)
          %} {{ ((t // 900) + 1) * 900 }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ dl_ts is not none and dl_ts < min_ok_ts }}'
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ev_deadline
          data:
            timestamp: '{{ next_q_ts }}'
  - id: ev_campaign_cost_reset_on_session_start
    alias: EV campaign → reset cost on session start
    mode: single
    triggers:
    - trigger: state
      entity_id: input_boolean.ev_charge_session_active
      to: 'on'
    actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_campaign_cost_eur
      data:
        value: 0
  - id: ev_campaign_cost_accumulate_15m
    alias: EV campaign → accumulate cost every 15m
    mode: single
    triggers:
    - trigger: time_pattern
      minutes: /15
      seconds: 1
    conditions:
    - condition: state
      entity_id: input_boolean.ev_charge_session_active
      state: 'on'
    actions:
    - variables:
        cur: '{{ states(''input_number.ev_campaign_cost_eur'') | float(0) }}'
        add: '{{ states(''sensor.ev_cost_this_15m_eur'') | float(0) }}'
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_campaign_cost_eur
      data:
        value: '{{ (cur + add) | round(2) }}'

  - id: ev_plug_in_takeover_gate
    alias: EV plug-in → takeover gate (stop unless slot now)
    mode: single
    triggers:
    - trigger: state
      entity_id: sensor.zag063912_charger_mode
      from:
      - disconnected
      - unknown
      to: connected_requesting
    - trigger: state
      entity_id: sensor.zag063912_charger_mode
      from:
      - disconnected
      - unknown
      to: connected_charging
    conditions:
    - condition: state
      entity_id: input_boolean.ev_smart_charge_enabled
      state: 'on'
    - condition: state
      entity_id: input_boolean.ev_takeover_armed
      state: 'on'
    actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_takeover_armed
    - choose:
      - conditions:
        - condition: state
          entity_id: binary_sensor.ev_should_charge_now_combined
          state: 'off'
        sequence:
        - action: button.press
          target:
            entity_id: button.zag063912_stop_charging
      default: []



  - id: ev_takeover_armed_init_on_start
    alias: EV takeover → init armed on HA start
    mode: single
    triggers:
    - trigger: homeassistant
      event: start
    actions:
    - choose:
      - conditions:
        - condition: template
          value_template: >
            {{ states('sensor.zag063912_charger_mode') in ['disconnected','unknown']
               and is_state('switch.zag063912_charging','off') }}
        sequence:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.ev_takeover_armed
      default:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ev_takeover_armed

  - id: ev_takeover_rearm_on_disconnect_or_safe_unknown
    alias: EV takeover → re-arm on disconnect (or safe unknown)
    mode: single
    triggers:
    - trigger: state
      entity_id: sensor.zag063912_charger_mode
      to: disconnected
    - trigger: state
      entity_id: sensor.zag063912_charger_mode
      to: unknown
      for: "00:02:00"
    conditions:
    - condition: state
      entity_id: switch.zag063912_charging
      state: 'off'
    actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_takeover_armed

  - id: ev_enabled_capture_start_soc
    alias: EV enabled → capture start SOC
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.ev_smart_charge_enabled
        to: "on"
    actions:
      - variables:
          soc_raw: "{{ states('sensor.smart_battery') }}"
      - condition: template
        value_template: "{{ soc_raw not in ['unknown','unavailable','none',''] }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.ev_start_soc
        data:
          value: "{{ soc_raw | float(0) | round(0) }}"

  - id: ev_target_reached_stop
    alias: EV target reached → stop charging
    description: >-
      When ev_remaining_used_kwh drops to near-zero (target fully charged),
      stop the charger after a 30-second debounce to avoid false stops during
      slider adjustments. If the target is raised again, the master controller
      resumes charging in the next cheap slot automatically.
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.ev_remaining_used_kwh
        below: 0.05
        for: "00:00:30"
    conditions:
      - condition: state
        entity_id: input_boolean.ev_smart_charge_enabled
        state: "on"
      # Don't stop while min charge plan wants to charge this slot
      - condition: state
        entity_id: binary_sensor.ev_should_charge_now_min_charge
        state: "off"
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ is_state('switch.zag063912_charging','on') or
                     states('sensor.zag063912_charger_mode') == 'connected_charging' }}
            sequence:
              - action: button.press
                target:
                  entity_id: button.zag063912_stop_charging

  # ── Session 3: No-plug-in notification ──────────────────────────────────

  - id: ev_no_plugin_check
    alias: EV → no plug-in notification check (every 5 min)
    description: >-
      Fires a mobile notification when the car is home, not plugged in, smart
      charging is enabled, and we're approaching the point-of-no-return.
      Option A: time_pattern every 5 min + condition + once-flag suppression.
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "/5"
        seconds: 30
    conditions:
      # Smart charging must be enabled
      - condition: state
        entity_id: input_boolean.ev_smart_charge_enabled
        state: "on"
      # Car must be home
      - condition: state
        entity_id: binary_sensor.ev_car_home
        state: "on"
      # Car must NOT be plugged in
      - condition: template
        value_template: >-
          {{ states('sensor.zag063912_charger_mode') in ['disconnected','unknown'] }}
      # No notification sent yet this event window
      - condition: state
        entity_id: input_boolean.ev_no_plugin_notified
        state: "off"
      # Skip-tonight flag not set
      - condition: state
        entity_id: input_boolean.ev_no_plugin_skip_tonight
        state: "off"
      # Still need to charge something meaningful (> 1 kWh remaining)
      - condition: numeric_state
        entity_id: sensor.ev_remaining_used_kwh
        above: 1.0
      # Within the notification window: now > latest_plugin_time - 60 min
      - condition: template
        value_template: >-
          {% set soc = states('sensor.smart_battery') | float(50) %}
          {% set max_soc = states('input_number.ev_max_soc') | float(80) %}
          {% set min_soc = states('input_number.ev_min_soc_pct') | float(30) %}
          {% set target_soc = [max_soc, min_soc] | min %}
          {% set kwh_needed = [(target_soc - soc) / 100 * 62.0, 0] | max %}
          {% set charge_kw = states('input_number.ev_assumed_charge_kw') | float(7.4) %}
          {% set hours_needed = kwh_needed / charge_kw if charge_kw > 0 else 999 %}
          {% set dl_s = states('input_datetime.ev_deadline') %}
          {% if dl_s in ['unknown','unavailable','none',''] %}
            false
          {% else %}
            {% set dl_ts = as_timestamp(as_datetime(dl_s)) | int(0) %}
            {% set latest_plugin_ts = (dl_ts - hours_needed * 3600) | int %}
            {% set now_ts = as_timestamp(now()) | int %}
            {% set window_sec = 3600 %}
            {{ now_ts > (latest_plugin_ts - window_sec) and latest_plugin_ts > now_ts }}
          {% endif %}
    actions:
      # Mark as notified (prevents re-firing until cleared)
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ev_no_plugin_notified
      # Send notification with iOS action buttons
      - variables:
          soc: "{{ states('sensor.smart_battery') | float(50) }}"
          max_soc: "{{ states('input_number.ev_max_soc') | float(80) }}"
          min_soc: "{{ states('input_number.ev_min_soc_pct') | float(30) }}"
          target_soc: "{{ [max_soc | float, min_soc | float] | min }}"
          kwh_needed: "{{ [(target_soc - soc) / 100 * 62.0, 0] | max | round(1) }}"
          charge_kw: "{{ states('input_number.ev_assumed_charge_kw') | float(7.4) }}"
          hours_needed: >-
            {{ (kwh_needed | float / charge_kw) if charge_kw > 0 else 999 }}
          dl_s: "{{ states('input_datetime.ev_deadline') }}"
          dl_ts: "{{ as_timestamp(as_datetime(dl_s)) | int(0) }}"
          latest_plugin_ts: "{{ (dl_ts - hours_needed | float * 3600) | int }}"
          latest_plugin_str: >-
            {{ as_datetime(latest_plugin_ts) | as_local | strftime('%H:%M') }}
      - action: notify.mobile_app_all_devices
        data:
          title: "EV — Plug In Soon"
          message: >-
            Please plug in before {{ latest_plugin_str }} to meet tomorrow's target.
            Need {{ kwh_needed }} kWh ({{ target_soc | round(0) | int }}% SOC).
          data:
            push:
              sound: default
            actions:
              - action: EV_PLUGIN_DO_IT
                title: "I'll do it now"
              - action: EV_PLUGIN_REMIND_30
                title: "Remind in 30 min"
              - action: EV_PLUGIN_SKIP
                title: "Skip tonight"

  # iOS action: "I'll do it now" — dismiss, leave notified flag on
  - id: ev_no_plugin_action_do_it
    alias: EV → no-plug-in action — I'll do it now
    mode: single
    triggers:
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: EV_PLUGIN_DO_IT
    actions: []

  # iOS action: "Remind in 30 min" — clear flag so notification can re-fire
  - id: ev_no_plugin_action_remind_30
    alias: EV → no-plug-in action — Remind in 30 min
    mode: single
    triggers:
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: EV_PLUGIN_REMIND_30
    actions:
      - delay: "00:30:00"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ev_no_plugin_notified

  # iOS action: "Skip tonight" — suppress for rest of day
  - id: ev_no_plugin_action_skip
    alias: EV → no-plug-in action — Skip tonight
    mode: single
    triggers:
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: EV_PLUGIN_SKIP
    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ev_no_plugin_skip_tonight

  # Midnight reset — clear notification flags so they can fire again tomorrow
  - id: ev_no_plugin_midnight_reset
    alias: EV → no-plug-in — midnight flag reset
    mode: single
    triggers:
      - trigger: time
        at: "00:01:00"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.ev_no_plugin_notified
            - input_boolean.ev_no_plugin_skip_tonight

  # Auto-clear shortfall warning when car plugs in (new cycle starts)
  - id: ev_shortfall_clear_on_plugin
    alias: EV → clear shortfall warning on plug-in
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.ev3_session_active
        from: "off"
        to: "on"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ev_shortfall_unrecoverable

