        #     {%- else -%} Please plug in soon to meet tomorrow's target. {%- endif -%}
        #   {%- elif car_home and not_plugged -%} {{ soc|round(0)|int }}% — no charge needed today.
        #   {%- elif not enabled -%} Smart charging is off. Charger will not run automatically.
        #   {%- elif should -%} Charging now in planned slot.
        #   {%- elif enabled and dl_ok -%} Waiting for cheap slot. On track for {{ dl_str }}.
        #   {%- else -%} Smart charging is off. Charger will not run automatically.
