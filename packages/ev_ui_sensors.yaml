        #   {%- elif enabled and should -%} smart_charging
        #   {%- elif enabled -%} smart_waiting
        #   {%- else -%} disabled
        #   {%- endif -%}

      # ── sensor.ev_status_narrative ───────────────────────────────────────────
      # Plain-English one-sentence status per DESIGN_SPEC Section 5.1.
      # Session 2: AppDaemon status_narrator.py writes to input_text.ev_status_narrative.
      # This sensor is a pass-through template — entity_id sensor.ev_status_narrative
      # is preserved so all UI references continue to work.
      # Session 1 template logic is commented out below for rollback reference.
      - name: "EV status narrative"
        unique_id: ev_status_narrative
        icon: mdi:comment-text-outline
        state: >-
          {{ states('input_text.ev_status_narrative') or
             'Smart charging is off. Charger will not run automatically.' }}
        # Session 1 fallback (commented out — kept for rollback):
        # state: >-
        #   {%- set enabled     = is_state('input_boolean.ev_smart_charge_enabled','on') -%}
        #   {%- set should      = is_state('binary_sensor.ev_should_charge_now_combined','on') -%}
        #   {%- set warn        = is_state('binary_sensor.ev_forecast_reliability_warning','on') -%}
        #   {%- set car_home    = is_state('device_tracker.smart_none','home') -%}
        #   {%- set soc         = states('sensor.smart_battery') | float(100) -%}
        #   {%- set min_soc     = states('input_number.ev_min_soc_pct') | float(30) -%}
        #   {%- set cmode       = states('sensor.zag063912_charger_mode') -%}
        #   {%- set not_plugged = cmode in ['disconnected','unknown'] -%}
        #   {%- set dl          = states('input_datetime.ev_deadline') -%}
